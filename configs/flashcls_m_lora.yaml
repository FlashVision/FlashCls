model:
  backbone_size: "1.0x"
  num_classes: 10
  input_size: [224, 224]
  dropout: 0.2

data:
  train_dir: data/custom/train
  val_dir: data/custom/val
  num_workers: 4

train:
  epochs: 30
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.01
  warmup_epochs: 3
  val_interval: 1
  save_dir: workspace/lora_m
  label_smoothing: 0.1

  use_lora: true
  lora_rank: 8
  lora_alpha: 16.0
  lora_dropout: 0.05
  lora_target_modules: ["backbone"]

augment:
  random_resized_crop: true
  horizontal_flip: 0.5
  color_jitter: [0.3, 0.3, 0.3, 0.1]
